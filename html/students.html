<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<blockquote>
<h1>Students Records</h1>
<hr>
<form>
    <label for="name">Name:</label>
    <input type="text" name="name" id="name" placeholder="enter your name" autofocus="autofocus">
    <br><br>
    <label for="email">Email</label>
    <input type="text" name="email" id="email" placeholder="enter your email address">
    <br><br>
    <label for="pass">Password</label>
    <input type="password" name="password" id="pass" placeholder="enter password">
    <br><br>
    <label for="phone">Phone</label>
    <input type="number" name="phone" id="phone" maxlength="10">
    <br><br>
    <label for="slug">Slug</label>
    <input type="text" value="learning html" id="slug" disabled>
    <br><br>
    <label for="gender">Gender</label>
    <input type="radio" name="gen" value="male">Male
    <input type="radio" name="gen" value="female">Female
    <br><br>
    <label for="language">Language</label>
    <input type="checkbox" name="lang" value="nepali">Nepali
    <input type="checkbox" name="lang" value="english">English
    <input type="checkbox" name="lang" value="chinese">Chinese
    <br><br>
    <label for="country">Country</label>
    <select name="country" id="country">
        <option selected disabled>---select country--</option>
        <option value="nepal">Nepal</option>
        <option value="china">China</option>
        <option value="bhutan">Bhutan</option>
        <option value="us">US</option>
    </select>
    <br><br>
    <label for="profile">Profile Picture</label>
    <input type="file" name="upload" id="profile" accept="image/*">
    <br><br>
    <label for="description">Description</label> <br>
    <textarea name="desc" id="description" rows="3" cols="40" style="resize: none"></textarea>
    <br><br>
    <button>Add</button>
    <input type="reset" value="reset">
</form>
</blockquote>

</body>
</html>
